name: Build and publish pybcsv wheels

on:
  push:
    branches: [ main, master, release ]
    tags:
      - 'v*'  # Trigger on version tags (v1.0.0, v1.0.1, etc.)
  pull_request:
    paths:
      - 'python/**'
      - 'include/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  CIBW_SKIP: "pp*"  # Skip PyPy builds

jobs:
  # ── Build sdist ─────────────────────────────────────────────────────
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Sync headers for sdist
        run: python python/sync_headers.py --verbose

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist python/ --outdir dist/

      - uses: actions/upload-artifact@v4
        with:
          name: built-sdist
          path: dist/*.tar.gz

  # ── Build Linux wheels ──────────────────────────────────────────────
  build-linux:
    name: Build Linux wheels (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm    # Native ARM64 runner (no QEMU)
            arch: aarch64
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.22.0 uv

      - name: Build wheels
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.arch }}
          CIBW_BUILD_FRONTEND: "build[uv]"
        run: python -m cibuildwheel python --output-dir dist

      - uses: actions/upload-artifact@v4
        with:
          name: built-wheels-linux-${{ matrix.arch }}
          path: dist/*.whl

  # ── Build Windows wheels ────────────────────────────────────────────
  build-windows:
    name: Build Windows wheels (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [AMD64]  # Add x86, ARM64 for releases when needed
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.22.0 uv

      - name: Build wheels
        env:
          CIBW_ARCHS_WINDOWS: ${{ matrix.arch }}
          CIBW_BUILD_FRONTEND: "build[uv]"
        run: python -m cibuildwheel python --output-dir dist

      - uses: actions/upload-artifact@v4
        with:
          name: built-wheels-windows-${{ matrix.arch }}
          path: dist/*.whl

  # ── Build macOS wheels ──────────────────────────────────────────────
  build-macos:
    name: Build macOS wheels (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15      # Cross-compile x86_64 on Apple Silicon
            arch: x86_64
          - os: macos-15      # Apple Silicon arm64 (Xcode 16.4 / Apple Clang 16)
            arch: arm64
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.22.0 uv

      - name: Build wheels
        env:
          CIBW_ARCHS_MACOS: ${{ matrix.arch }}
          CIBW_BUILD_FRONTEND: "build[uv]"
          MACOSX_DEPLOYMENT_TARGET: "13.3"
        run: python -m cibuildwheel python --output-dir dist

      - uses: actions/upload-artifact@v4
        with:
          name: built-wheels-macos-${{ matrix.arch }}
          path: dist/*.whl

  # ── Test built wheel ────────────────────────────────────────────────
  test-wheel:
    name: Test wheel (${{ matrix.name }})
    needs: [build-linux, build-windows, build-macos]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            artifact: built-wheels-linux-x86_64
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            artifact: built-wheels-linux-aarch64
          - name: Windows AMD64
            os: windows-latest
            artifact: built-wheels-windows-AMD64
          - name: macOS ARM64
            os: macos-15
            artifact: built-wheels-macos-arm64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist

      - name: Install wheel and test dependencies
        run: |
          pip install pytest pandas numpy pyarrow
          pip install pybcsv --find-links dist/ --no-index

      - name: Run pybcsv test suite
        run: python -m pytest python/tests/ -v --tb=short

  # ── Publish to PyPI (Trusted Publisher / OIDC) ──────────────────────
  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build-sdist, build-linux, build-windows, build-macos, test-wheel]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    environment: testpypi
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          pattern: built-*
          merge-multiple: false

      - name: Collect all distributions
        run: |
          mkdir -p dist
          find dist-artifacts -name "*.whl" -o -name "*.tar.gz" | xargs -I{} cp {} dist/
          echo "=== Distributions to upload ==="
          ls -lh dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs: [build-sdist, build-linux, build-windows, build-macos, test-wheel]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          pattern: built-*
          merge-multiple: false

      - name: Collect all distributions
        run: |
          mkdir -p dist
          find dist-artifacts -name "*.whl" -o -name "*.tar.gz" | xargs -I{} cp {} dist/
          echo "=== Distributions to upload ==="
          ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── Post-publish smoke test ─────────────────────────────────────────
  smoke-test:
    name: Smoke test from TestPyPI
    needs: [publish-testpypi]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Install from TestPyPI and test
        run: |
          python -m venv /tmp/smoke
          source /tmp/smoke/bin/activate
          pip install --upgrade pip
          # Install numpy, pandas, pyarrow from PyPI first (not available on TestPyPI)
          pip install numpy pandas pyarrow
          # Install pybcsv from TestPyPI (--pre for dev/pre-release versions from non-tag pushes)
          pip install --pre --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ pybcsv
          python -c "
          import pybcsv
          print(f'pybcsv {pybcsv.__version__} imported successfully')
          # Basic functionality check
          layout = pybcsv.Layout()
          layout.add_column('x', pybcsv.ColumnType.DOUBLE)
          layout.add_column('s', pybcsv.ColumnType.STRING)
          print(f'Layout: {layout.column_count()} columns')
          # Arrow interop check
          import tempfile, os
          path = os.path.join(tempfile.mkdtemp(), 'smoke.bcsv')
          w = pybcsv.Writer(layout)
          w.open(path)
          w.write_row([3.14, 'hello'])
          w.close()
          table = pybcsv.read_to_arrow(path)
          assert len(table) == 1
          os.unlink(path)
          print('Smoke test PASSED (core + Arrow)')
          "
